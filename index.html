<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Andrew Walker</title>
    <style>
      @font-face {
        font-family: "JetBrains Mono";
        font-style: normal;
        font-weight: 400;
        font-display: swap;
        src: url("fonts/JetBrainsMono-Regular.woff2") format("woff2");
      }
      @font-face {
        font-family: "JetBrains Mono";
        font-style: italic;
        font-weight: 400;
        font-display: swap;
        src: url("fonts/JetBrainsMono-Italic.woff2") format("woff2");
      }
      @font-face {
        font-family: "JetBrains Mono";
        font-style: normal;
        font-weight: 500;
        font-display: swap;
        src: url("fonts/JetBrainsMono-Medium.woff2") format("woff2");
      }
      @font-face {
        font-family: "JetBrains Mono";
        font-style: normal;
        font-weight: 700;
        font-display: swap;
        src: url("fonts/JetBrainsMono-Bold.woff2") format("woff2");
      }
      :root {
        --fg: #333;
        --fg-muted: #555;
        --fg-faint: #999;
        --border: #e0e0e0;
        --accent: #333;
        --size-body: 16px;
        --size-heading: 18px;
        --size-banner: 18px;
      }
      @media (max-width: 600px) {
        :root {
          --size-body: 15px;
          --size-heading: 17px;
          --size-banner: clamp(16px, 3.8vw, 18px);
        }
      }
      body {
        font-family:
          "JetBrains Mono", "Fira Code", "SF Mono", "Cascadia Code", "Consolas",
          monospace;
        font-size: var(--size-body);
        line-height: 1.5;
        color: var(--fg);
        background: #fff;
        max-width: 44em;
        margin: 0 auto 5em;
        padding: 0 3em;
      }
      .banner {
        font-family: inherit;
        font-weight: 500;
        font-size: var(--size-banner);
        line-height: 1.1;
        white-space: pre;
        text-align: center;
        color: #333;
        position: sticky;
        top: 0;
        background: #fff;
        z-index: 10;
        padding: 50px 0 40px;
      }
      .banner::after {
        content: "";
        position: absolute;
        left: 0;
        right: 0;
        bottom: 30px;
        border-bottom: 1px solid transparent;
        transition: border-color 0.2s ease;
      }
      .banner.scrolled::after {
        border-bottom-color: var(--border);
      }
      .banner + * {
        margin-top: 10px;
      }
      @media (max-width: 600px) {
        body {
          padding: 0 1.5em;
        }
        .banner {
          padding: 36px 0 28px;
        }
        .banner::after {
          bottom: 22px;
        }
      }
      h1 {
        color: #333;
        font-size: var(--size-heading);
        font-weight: 700;
        margin: 2em 0 0.4em;
      }
      p {
        color: var(--fg-muted);
        margin: 1em 0;
      }
      b,
      strong {
        color: var(--fg);
      }
      ul,
      ol {
        margin: 0.6em 0 0.6em 1.5em;
        padding-left: 1.4em;
        color: var(--fg-muted);
      }
      li {
        margin: 0.2em 0;
      }
      li ul {
        list-style-type: disc;
      }
      a {
        color: var(--accent);
        text-decoration: underline;
        text-decoration-thickness: 1px;
        text-underline-offset: 3px;
      }
      a:hover {
        text-decoration-thickness: 2px;
      }
      code {
        font-family: inherit;
        background: #f5f5f5;
        padding: 0.05em 0.4em;
        border-radius: 3px;
        color: var(--fg);
        overflow-wrap: anywhere;
      }
      .copy-btn {
        font: inherit;
        font-size: 0.85em;
        margin-left: 0.4em;
        padding: 0.05em 0.6em;
        background: #fff;
        border: 1px solid var(--border);
        border-radius: 3px;
        color: var(--fg-muted);
        cursor: pointer;
        vertical-align: baseline;
      }
      .copy-btn:hover {
        color: var(--fg);
        border-color: var(--fg-muted);
      }
      .copy-btn.copied {
        color: var(--fg);
        background: #f5f5f5;
      }
      .ascii-art {
        font-family: inherit;
        color: var(--fg);
        line-height: 1.1;
        margin: 2em auto;
        white-space: pre;
        width: fit-content;
        max-width: 100%;
        overflow-x: auto;
      }
      .footer {
        color: var(--fg-faint);
        font-size: var(--size-body);
        margin-top: 4em;
        border-top: 1px solid var(--border);
        padding-top: 1.5em;
      }
      /* landing: centered headshot only */
      body {
        max-width: none;
        margin: 0;
        padding: 0;
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
      }
      .headshot {
        display: block;
        height: 160px;
        width: auto;
      }
      @media (max-width: 600px) {
        .headshot {
          height: 130px;
        }
      }
    </style>
  </head>
  <body>
    <img class="headshot" src="img/andrew.png" alt="Andrew Walker" />
  </body>
</html>
